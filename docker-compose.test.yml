version: "3.9"

services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: esms_test
      POSTGRES_USER: esms
      POSTGRES_PASSWORD: esms_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esms -d esms_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  test-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  test-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m pytest --cov=apps --cov-report=term --tb=short
    environment:
      DATABASE_HOST: test-db
      DATABASE_PORT: "5432"
      POSTGRES_DB: esms_test
      POSTGRES_USER: esms
      POSTGRES_PASSWORD: esms_password
      REDIS_URL: redis://test-redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_DEBUG: "False"
    depends_on:
      test-db:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
